name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: make CC=gcc

      - name: Run unit tests
        run: make test CC=gcc

      - name: Run C-to-A64 compiler tests
        run: make test-c2asm CC=gcc

  lint:
    name: Lint (clang on Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang
        run: sudo apt-get install -y clang

      - name: Build with clang
        run: make CC=clang CFLAGS="-std=c17 -g -O2 -Wall -Wextra -Werror -pedantic"

      - name: Run tests with clang build
        run: make test CC=clang CFLAGS="-std=c17 -g -O2 -Wall -Wextra -Werror -pedantic"
